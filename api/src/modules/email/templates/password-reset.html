<!doctype html>
<html lang="en">
  <body
    style="
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,
        Roboto,
        sans-serif;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      color: #111;
    "
  >
    <h1 style="font-size: 22px; color: #111; margin: 0 0 16px">Reset your password</h1>
    <p>
      Hi {{name}}, click the link below to set a new password. The link expires in {{ttlMinutes}}
      minutes.
    </p>
    <p>
      <a
        href="{{resetUrl}}"
        style="
          display: inline-block;
          background: linear-gradient(135deg, #ec1b7c, #a60c5c);
          color: #fff;
          padding: 12px 24px;
          border-radius: 12px;
          text-decoration: none;
          font-weight: 700;
        "
        >Reset password</a
      >
    </p>
    <p style="font-size: 12px; color: #666">
      Didn't request this? Ignore this email — your password stays the same. The link will expire on
      its own.
    </p>
  </body>
</html>
