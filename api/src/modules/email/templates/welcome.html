<!doctype html>
<html lang="en">
  <body
    style="
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,
        Roboto,
        sans-serif;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      color: #111;
    "
  >
    <div style="text-align: center; margin-bottom: 24px">
      <h1 style="font-size: 24px; color: #ec1b7c; margin: 0">Welcome to Vuedine, {{name}}</h1>
    </div>
    <p>Your restaurant <strong>{{tenantName}}</strong> is set up and ready.</p>
    <p>
      <a
        href="{{dashboardUrl}}"
        style="
          display: inline-block;
          background: linear-gradient(135deg, #ec1b7c, #f97316);
          color: #fff;
          padding: 12px 24px;
          border-radius: 12px;
          text-decoration: none;
          font-weight: 700;
        "
        >Open dashboard</a
      >
    </p>
    <p style="font-size: 12px; color: #666; margin-top: 32px">
      Sent by Vuedine · this is a transactional email you can't unsubscribe from.
    </p>
  </body>
</html>
