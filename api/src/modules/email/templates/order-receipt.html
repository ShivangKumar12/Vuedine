<!doctype html>
<html lang="en">
  <body
    style="
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,
        Roboto,
        sans-serif;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      color: #111;
    "
  >
    <h1 style="font-size: 22px; margin: 0 0 4px">Thank you, {{customerName}}</h1>
    <p style="color: #666; margin: 0 0 24px">Order <strong>#{{orderId}}</strong> · {{date}}</p>

    <table style="width: 100%; border-collapse: collapse">
      <tbody>
        {{lineItems}}
      </tbody>
    </table>

    <table style="width: 100%; margin-top: 24px">
      <tr>
        <td>Subtotal</td>
        <td style="text-align: right">{{currencySymbol}}{{subtotal}}</td>
      </tr>
      <tr>
        <td>Tax</td>
        <td style="text-align: right">{{currencySymbol}}{{tax}}</td>
      </tr>
      <tr style="font-weight: 700; font-size: 18px">
        <td>Total</td>
        <td style="text-align: right">{{currencySymbol}}{{total}}</td>
      </tr>
    </table>

    <p style="font-size: 12px; color: #666; margin-top: 32px">
      Questions? Reply to this email and your restaurant team will help.
    </p>
  </body>
</html>
