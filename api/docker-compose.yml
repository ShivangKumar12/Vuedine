name: vuedine

# ============================================================
#  Local development stack (Phase 11 — full stack landed).
#
#  `docker compose up -d` brings up:
#    api          — Express on :4000 (cluster via PM2 in pm2-runtime)
#    worker       — BullMQ workers (no HTTP)
#    postgres     — :5434 host (5432 inside)
#    redis        — :6381 host (6379 inside)
#    nginx        — :8080 / :8443 — proxies to api, terminates TLS in prod
#    bull-board   — :4001 — queue dashboard (auth-gated)
#    prometheus   — :9090
#    grafana      — :3001
#
#  Ports use unusual host numbers (5434/6381/3001/8080/8443) so this stack
#  coexists with other Vuedine projects on the same machine.
# ============================================================

# ----- Reusable definition for every node service that runs our image -----
x-app-base: &app-base
  image: vuedine-api:dev
  build:
    context: .
    dockerfile: docker/Dockerfile
    target: production
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  api:
    <<: *app-base
    container_name: vuedine_api
    command: ['node', 'src/server.js']
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/health']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  worker:
    <<: *app-base
    container_name: vuedine_worker
    command: ['node', 'src/queues/workers/index.js']
    # No port binding — workers are pure consumers.
    healthcheck:
      # Workers don't expose HTTP. A simple `node -e "process.exit(0)"` proves
      # the process is alive; for richer checks, BullMQ's `waiting + active`
      # counts surface in /metrics on the API side.
      test: ['CMD', 'node', '-e', 'process.exit(0)']
      interval: 30s
      timeout: 5s
      retries: 3

  bull-board:
    <<: *app-base
    container_name: vuedine_bullboard
    command: ['node', 'scripts/bull-board.js']
    ports:
      - '4001:4001'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', '-u', 'admin:admin', 'http://localhost:4001/']
      interval: 30s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: vuedine_nginx
    restart: unless-stopped
    # 8080/8443 host-side keeps stock 80/443 free for any other gateway.
    # Production deploys map these to the public 80/443 directly.
    ports:
      - '8080:80'
      - '8443:443'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: vuedine_api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vuedine
      POSTGRES_PASSWORD: vuedine_dev
      POSTGRES_DB: vuedine
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5434:5432'
    command:
      - 'postgres'
      - '-c'
      - 'max_connections=200'
      - '-c'
      - 'shared_buffers=256MB'
      - '-c'
      - 'log_min_duration_statement=200'
      - '-c'
      - 'log_connections=off'
      - '-c'
      - 'log_disconnections=off'
      - '-c'
      - 'shared_preload_libraries=pg_stat_statements'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vuedine -d vuedine']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vuedine_api_redis
    restart: unless-stopped
    # AOF for queue/RL durability + RDB for fast cold-restart of cache.
    # `allkeys-lru` is right for a mixed cache + RL + queue workload —
    # see BACKEND_PHASES.md Phase 3 / Phase 14.
    command:
      - 'redis-server'
      - '--appendonly'
      - 'yes'
      - '--appendfsync'
      - 'everysec'
      - '--maxmemory'
      - '512mb'
      - '--maxmemory-policy'
      - 'allkeys-lru'
      - '--save'
      - '60 1000'
    volumes:
      - redis_data:/data
    ports:
      - '6381:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: vuedine_api_prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    extra_hosts:
      # Allow scraping the host's API/worker if they run outside compose.
      - 'host.docker.internal:host-gateway'

  grafana:
    image: grafana/grafana:11.3.0
    container_name: vuedine_api_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - '3001:3000'
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  certbot_certs:
  certbot_webroot:
