# ============================================================
#  Shared proxy headers for upstream backends.
#  Included from `default.conf` location blocks.
# ============================================================

# HTTP/1.1 to keep alive connections to upstream and avoid socket churn.
proxy_http_version 1.1;
proxy_set_header   Connection "";

# Pass through identity headers.
proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;

# Propagate or generate a request id so server-side logs can stitch back to the edge.
proxy_set_header   X-Request-Id      $request_id;

# Reasonable defaults — most app routes complete in <1s. Endpoints that
# legitimately need longer (uploads, exports) override locally.
proxy_connect_timeout 5s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Don't buffer streamed responses (e.g. SSE, file streams).
proxy_request_buffering off;
proxy_buffering         off;
