# ============================================================
#  Vuedine API edge configuration
#  ----
#  Local dev profile: HTTP only, all upstreams unencrypted.
#  Production: see `default.prod.conf` (Phase 11) — HTTPS via certbot,
#  HSTS, OCSP stapling, the works.
# ============================================================

upstream vuedine_api {
    least_conn;
    # In compose, the API service registers as `api`. In dev (host bound),
    # this would be `host.docker.internal:4000`. We default to compose form.
    server api:4000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# Edge rate limiting zones — separate buckets for general vs auth traffic so
# a login burst from one IP doesn't burn through a customer's menu refreshes.
limit_req_zone $binary_remote_addr zone=general:10m rate=300r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;

server {
    listen 80 default_server;
    server_name _;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---- Body size + keepalive ----
    client_max_body_size 12m;        # multer caps lower (Phase 5: 10m); 12m is the edge ceiling
    client_body_timeout  30s;
    keepalive_timeout    65;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        text/xml;

    # ---- Block /metrics from the public internet (defense in depth — the
    #      app already requires a Bearer token, but never expose by default). ----
    location = /metrics {
        deny all;
        return 403;
    }

    # ---- Auth: harsher rate limit ----
    location ~ ^/v1/auth/(login|password) {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://vuedine_api;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- WebSocket: must upgrade ----
    location /ws/ {
        proxy_pass http://vuedine_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for chatty / idle connections.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ---- General API ----
    location / {
        limit_req zone=general burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://vuedine_api;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }
}
