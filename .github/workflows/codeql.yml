# ============================================================
#  CodeQL — static application security testing (SAST).
#
#  Scans the whole monorepo (api + app) for the JavaScript/TypeScript
#  vulnerability + quality query suite. Results surface under the repo's
#  Security ▸ Code scanning alerts tab — the measurable security signal
#  for the codebase.
#
#  Runs on: push to main/develop, every PR, and a weekly schedule so newly
#  published CodeQL queries catch latent issues without a code change.
# ============================================================
name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '27 3 * * 1' # Mondays 03:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
